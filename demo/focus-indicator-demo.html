<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Git Lens — pane focus indicator options</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f6f7f9;
    --bg-modifier-border: #e3e5e8;
    --text-normal: #2e3338;
    --text-muted: #888e96;
    --text-faint: #adb3ba;
    --accent: #6b62e6;          /* interactive-accent-ish */
    --accent-soft: #ece9ff;
    --green: #2c9a5a;
    --red: #c8483a;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--text-normal);
    background: #eef0f3;
    padding: 28px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--text-muted); font-size: 13px; margin: 0 0 20px; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    align-items: center;
    margin-bottom: 22px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--bg-modifier-border);
    border-radius: 10px;
  }
  .controls label { font-size: 13px; font-weight: 600; }
  .controls .hint { font-size: 12px; color: var(--text-muted); }
  select, button {
    font: inherit;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 7px;
    border: 1px solid var(--bg-modifier-border);
    background: var(--bg);
    color: var(--text-normal);
    cursor: pointer;
  }
  button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--bg);
    border: 1px solid var(--bg-modifier-border);
    border-radius: 12px;
    padding: 14px;
  }
  .card h2 { font-size: 14px; margin: 0 0 2px; }
  .card p.desc { font-size: 12px; color: var(--text-muted); margin: 0 0 12px; min-height: 30px; }

  /* ---- the mock modal: two panes ---- */
  .modal {
    display: flex;
    gap: 10px;
    height: 260px;
    background: var(--bg);
    border: 1px solid var(--bg-modifier-border);
    border-radius: 8px;
    padding: 8px;
  }
  .pane { position: relative; border-radius: 6px; overflow: hidden; transition: all .15s ease; }
  .list { flex: 0 0 150px; border-right: 1px solid var(--bg-modifier-border); padding-right: 2px; overflow-y: auto; }
  .detail { flex: 1 1 auto; overflow: auto; background: var(--bg-secondary); }

  .commit { padding: 7px 8px; border-radius: 5px; cursor: default; }
  .commit + .commit { margin-top: 2px; }
  .commit.sel { background: var(--accent-soft); }
  .commit .summary { font-size: 12px; font-weight: 600; line-height: 1.3; }
  .commit .meta { font-size: 10px; color: var(--text-faint); margin-top: 2px; font-family: var(--mono); }

  .diff { font-family: var(--mono); font-size: 11px; line-height: 1.5; padding: 6px 8px; }
  .diff .h { color: var(--text-muted); }
  .diff .add { color: var(--green); }
  .diff .del { color: var(--red); }

  .focus-tag {
    position: absolute; top: 6px; right: 6px;
    font-size: 9px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    color: var(--accent); background: var(--bg);
    border: 1px solid var(--accent); border-radius: 4px;
    padding: 1px 5px; opacity: 0; transition: opacity .15s ease;
  }

  /* =========================================================
     OPTION STYLES — each scoped by a class on .modal
     ========================================================= */

  /* A: inset accent ring (current implementation) */
  .opt-ring .pane.focused { box-shadow: inset 0 0 0 2px var(--accent); }

  /* B: thick left accent bar */
  .opt-bar .pane { box-shadow: inset 3px 0 0 transparent; }
  .opt-bar .pane.focused { box-shadow: inset 3px 0 0 var(--accent); background: linear-gradient(90deg, var(--accent-soft), transparent 40%); }

  /* C: dim the unfocused pane */
  .opt-dim .pane { opacity: .55; filter: saturate(.6); }
  .opt-dim .pane.focused { opacity: 1; filter: none; box-shadow: inset 0 0 0 1px var(--accent); }

  /* D: soft outer glow */
  .opt-glow .pane.focused { box-shadow: 0 0 0 2px var(--accent), 0 4px 14px -2px rgba(107,98,230,.45); }

  /* E: corner focus tag only (no border) */
  .opt-tag .pane.focused .focus-tag { opacity: 1; }
  .opt-tag .pane.focused { background-color: rgba(107,98,230,.05); }

  /* F: top accent underline + tinted bg */
  .opt-top .pane { box-shadow: inset 0 2px 0 transparent; }
  .opt-top .pane.focused { box-shadow: inset 0 2px 0 var(--accent); background-color: var(--accent-soft); }

  /* used when a "show both" comparison renders */
  .pair { display:flex; gap:6px; }
  .pair small { display:block; text-align:center; font-size:10px; color:var(--text-muted); margin-top:4px; }
</style>
</head>
<body>
  <h1>Git Lens — pane focus indicator options</h1>
  <p class="sub">Click a pane to move focus (simulating Left/Right arrows). Use the toggle to flip every demo at once. Option A is what's currently shipped.</p>

  <div class="controls">
    <label>Focus:</label>
    <button id="focusList" class="active">◀ Commits</button>
    <button id="focusDetail">Diff ▶</button>
    <span class="hint">Or click any pane below.</span>
  </div>

  <div class="gallery" id="gallery"></div>

  <script>
    const OPTIONS = [
      { cls: "opt-ring", title: "A · Inset accent ring (current)", desc: "2px accent ring inset on the focused pane. No layout shift. Subtle but can be easy to miss on a busy diff." },
      { cls: "opt-bar",  title: "B · Left accent bar + tint", desc: "Thick accent bar on the inner edge plus a soft gradient tint. Reads like a 'selected' rail; very glanceable." },
      { cls: "opt-dim",  title: "C · Dim the unfocused pane", desc: "Unfocused pane fades & desaturates; focused pane is full-strength. Strongest signal, draws the eye to where keys act." },
      { cls: "opt-glow", title: "D · Soft outer glow", desc: "Accent ring plus a soft drop shadow, lifting the focused pane. Modern, but the shadow needs padding room." },
      { cls: "opt-tag",  title: "E · Corner focus tag", desc: "A small 'FOCUS' chip appears in the active pane with a faint tint. Explicit and self-explaining; minimal chrome." },
      { cls: "opt-top",  title: "F · Top underline + tint", desc: "Accent underline along the top edge with a light fill. Header-like; pairs well if panes ever get titles." },
    ];

    const listHTML = `
      <div class="commit sel"><div class="summary">keyboard navigation</div><div class="meta">829194e · Nan</div></div>
      <div class="commit"><div class="summary">blame click opens history</div><div class="meta">d3f822c · Nan</div></div>
      <div class="commit"><div class="summary">word-level diff</div><div class="meta">7c2cc30 · Nan</div></div>
      <div class="commit"><div class="summary">keep expand icon clear</div><div class="meta">4bc1929 · Nan</div></div>
      <div class="commit"><div class="summary">history for all files</div><div class="meta">26a5f84 · Nan</div></div>`;

    const diffHTML = `
      <div class="diff">
        <div class="h">@@ -196,10 +196,14 @@ onOpen()</div>
        <div class="del">- this.scope.register([], "ArrowLeft", () =&gt; {</div>
        <div class="del">-   this.scrollDetail(0, -STEP);</div>
        <div class="add">+ this.scope.register([], "ArrowLeft", () =&gt; {</div>
        <div class="add">+   this.setFocus("commits");</div>
        <div>&nbsp;   return false;</div>
        <div>&nbsp; });</div>
        <div class="add">+ this.scope.register([], "ArrowUp", () =&gt; {</div>
        <div class="add">+   if (this.focusedPane === "diff")</div>
        <div class="add">+     this.scrollDetail(-STEP, 0);</div>
        <div class="add">+   else this.selectRelative(-1);</div>
        <div>&nbsp; });</div>
      </div>`;

    let focused = "list";

    function buildCard(opt) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h2>${opt.title}</h2>
        <p class="desc">${opt.desc}</p>
        <div class="modal ${opt.cls}">
          <div class="pane list" data-pane="list">${listHTML}<span class="focus-tag">focus</span></div>
          <div class="pane detail" data-pane="detail">${diffHTML}<span class="focus-tag">focus</span></div>
        </div>`;
      card.querySelectorAll(".pane").forEach(p => {
        p.addEventListener("click", () => setFocus(p.dataset.pane));
      });
      return card;
    }

    function setFocus(which) {
      focused = which;
      document.querySelectorAll(".modal .pane").forEach(p => {
        p.classList.toggle("focused", p.dataset.pane === which);
      });
      document.getElementById("focusList").classList.toggle("active", which === "list");
      document.getElementById("focusDetail").classList.toggle("active", which === "detail");
    }

    const gallery = document.getElementById("gallery");
    OPTIONS.forEach(o => gallery.appendChild(buildCard(o)));
    document.getElementById("focusList").addEventListener("click", () => setFocus("list"));
    document.getElementById("focusDetail").addEventListener("click", () => setFocus("detail"));
    setFocus("list");
  </script>
</body>
</html>
